<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <div class="canvas-color-options">
      <canvas class="canvas" width="1000px" height="800px"></canvas>
      <div class="color-options">
        <p id="red" class="color-box"></p>
        <p id="blue" class="color-box"></p>
        <p id="black" class="color-box selected"></p>
        <p id="green" class="color-box"></p>
        <p id="yellow" class="color-box"></p>
      </div>
    </div>
    <div class="options-box">
      <p id="line">/</p>
      <p id="pencil">✎</p>
      <p id="eraser">🧽</p>
      <svg id="rectangle" width="150px" height="150px">
        <rect
          width="25px"
          height="25px"
          x="25"
          y="11"
          fill="none"
          stroke="black"
          stroke-width="3"
        ></rect>
      </svg>
    </div>
  </body>
</html>
